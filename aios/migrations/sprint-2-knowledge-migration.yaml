migration:
  id: MIG-AIOS-S2-001
  name: AIOS Sprint 2 Knowledge Layer Migration
  version: 1.0.0
  owner: Hudson Mar
  started_at: 2026-07-16
  updated_at: 2026-07-16
  status: completed_phase_1
  source_repository: hudsonmar-852/prompt2
  production_impact: none

scope:
  included:
    - data/templates.js
    - template definitions
    - prompt pattern definitions
    - registry cross-references
  excluded_for_later_phase:
    - JavaScript application logic
    - CSS and page presentation
    - localStorage runtime records
    - exported user-generated prompt files

migration_rules:
  - Preserve existing production source files unchanged
  - Registry records reference rather than replace runtime assets
  - Assign stable IDs and semantic versions
  - Record source path and migration date
  - Include validation and human-review requirements
  - Never mark an unverified asset as approved

inventory:
  scanned_assets:
    - path: data/templates.js
      type: source_file
      status: migrated
      discovered_templates: 6
      discovered_feature_cards: 4

migrated_objects:
  templates:
    total: 6
    registry: aios/registries/template-registry.yaml
    ids: [TPL-001, TPL-002, TPL-003, TPL-004, TPL-005, TPL-006]
  prompt_patterns:
    total: 5
    registry: aios/registries/prompt-pattern-registry.yaml
    ids: [PPT-001, PPT-002, PPT-003, PPT-004, PPT-005]

mapping:
