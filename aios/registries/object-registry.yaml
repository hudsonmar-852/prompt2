schema_version: "1.0"
registry:
  id: REG-OBJECT-001
  name: AIOS Object Registry
  version: "1.1.0"
  updated_at: "2026-07-16"

object_schema:
  required:
    - id
    - type
    - name
    - version
    - status
    - owner
    - location
    - created_at
    - updated_at
  optional:
    - description
    - tags
    - dependencies
    - source
    - source_date
    - confidence
    - sensitivity
    - retention
    - review_status
    - rollback_location

allowed_types:
  - project
  - workflow
  - skill
  - prompt
  - template
  - sop
  - automation
  - agent
  - report
  - document
  - person
  - company
  - meeting
  - task
  - research

status_values:
  - draft
  - active
  - review
  - deprecated
  - archived
  - blocked

