schema_version: "1.3"
aios:
  id: AIOS-CORE
  name: Hudson AI Operating System
  version: "1.5.0"
  release: Production Dispatcher and Validation Controls
  owner: Hudson Mar
  status: active
  updated_at: "2026-07-18"

principles: [reusable_by_default, source_traceable, human_review_for_high_impact, version_controlled, minimum_necessary_access, rollback_ready, provider_neutral_core, value_over_volume]

layers:
  kernel:
    status: active
    components: [manifest, object_registry, skill_registry, workflow_registry, context_engine, version_manager, registry_validator, registry_index, model_alias_router, capability_package_contract, agent_dispatcher]
  knowledge:
    status: active
    components: [prompts, prompt_patterns, workflows, skills, templates, sop, research, migration_log, image_failure_learning, image_style_library]
  automation:
    status: partial
    connectors:
      github: enabled
      github_actions_validation: enabled
      google_drive_archive: interface_ready
      webhook: designed
      gmail: planned
      calendar: planned
  agents:
    status: production_specification
    components: [research_agent, interview_agent, content_agent, automation_agent, qa_agent, image_production_agent, runtime_router, agent_dispatcher]
  image_engine:
    status: production_standard
    production_workflow: WF-004
    specification: aios/schemas/image-spec-schema.yaml
    style_registry: aios/registries/image-style-registry.yaml
  runtime:
    status: production_standard
    production_workflow: WF-005
    model_alias_registry: aios/registries/model-alias-registry.yaml
    runtime_adapter_registry: aios/registries/runtime-adapter-registry.yaml
  reports:
    registry_validation: enabled
    value_metrics: active

registries:
  index: aios/index/registry-index.yaml
  objects: aios/registries/object-registry.yaml
  skills: aios/registries/skill-registry.yaml
  workflows: aios/registries/workflow-registry.yaml
  templates: aios/registries/template-registry.yaml
  prompt_patterns: aios/registries/prompt-pattern-registry.yaml
  model_aliases: aios/registries/model-alias-registry.yaml
  runtime_adapters: aios/registries/runtime-adapter-registry.yaml
  image_styles: aios/registries/image-style-registry.yaml

schemas:
  image_spec: aios/schemas/image-spec-schema.yaml

dispatcher:
  status: production_specification
  path: aios/dispatcher/agent-dispatcher.yaml

connectors:
  google_drive_archive:
    status: interface_ready
    path: aios/connectors/google-drive-archive-interface.yaml

validation:
  status: active
  engine: aios/tools/validate_registries.py
  engine_version: "1.1.0"
  workflow: .github/workflows/aios-registry-validation.yml
  report: aios/reports/registry-validation-latest.json
  fixtures:
    valid: aios/tests/fixtures/valid-model-alias-registry.yaml
    invalid: aios/tests/fixtures/invalid-model-alias-registry.yaml
  blocking_checks: [yaml_syntax, registry_specific_required_fields, duplicate_ids_within_collection]
  advisory_checks: [unresolved_dependencies, missing_source_paths, unknown_fallback_alias, unknown_supported_alias]

safety_gate:
  source_required: true
  permission_check_required: true
  validation_required: true
  human_approval_for_high_impact: true
  rollback_plan_required: true
  cost_guardrail_required_for_agentic_runs: true
  retry_limit_required: true

provenance:
  required_fields: [source, source_date, generated_by, model_or_tool, version, human_review_status, archive_location]
  runtime_fields: [provider, actual_model, model_alias, runtime_adapter, token_or_credit_usage, estimated_cost, actual_cost, retry_count]
  image_fields: [identity_anchor, scene_reference, image_spec_version, style_id, qa_scorecard, approval_status]

deployment:
  repository: hudsonmar-852/prompt2
  branch: main
  production_site: github_pages
  compatibility_rule: "AIOS core files must not break the existing Prompt2 web application."
  runtime_files_modified: false

migration_status:
  skills_registered: 10
  workflows_registered: 5
  model_aliases_registered: 6
  runtime_adapters_registered: 7
  image_styles_registered: 6
  image_schemas_registered: 1
  registry_index_registered: 1
  dispatcher_specs_registered: 1
  connector_interfaces_registered: 1
  phase: production_dispatch_ready

roadmap:
  current_sprint: sprint_4_dispatch_validation
  completed:
    - create_model_alias_registry
    - create_runtime_adapter_registry
    - create_image_style_registry
    - create_image_spec_schema
    - extend_validator_for_registry_specific_required_fields
    - add_validation_test_fixtures
    - build_registry_index
    - build_agent_dispatcher_specification
    - create_google_drive_archive_interface
  next:
    - implement_dispatcher_runtime
    - add_dispatcher_unit_tests
    - implement_google_drive_connector_adapter
    - add_archive_smoke_and_retrieval_tests
    - connect_value_metrics_dashboard
